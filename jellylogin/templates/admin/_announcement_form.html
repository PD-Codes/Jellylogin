<!-- Shared announcement form fields (add + edit) -->
<div class="form-group">
  <label>Titel <span class="required">*</span></label>
  <input type="text" name="title" required maxlength="120" placeholder="z.B. Wartungsarbeiten am Wochenende">
</div>

<div class="form-group">
  <label>Text <span class="text-muted">(optional)</span></label>
  <textarea name="body" rows="3" placeholder="Details zur Ankündigung…"></textarea>
</div>

<div class="form-group">
  <label>Severity</label>
  <select name="severity">
    <option value="info">ℹ️ Info</option>
    <option value="warning">⚠️ Warnung</option>
    <option value="critical">🔴 Kritisch</option>
  </select>
</div>

<div class="form-grid" style="gap:.75rem">
  <div class="form-group">
    <label>Anzeigen ab <span class="text-muted">(optional)</span></label>
    <input type="datetime-local" name="start_at">
  </div>
  <div class="form-group">
    <label>Anzeigen bis <span class="text-muted">(optional)</span></label>
    <input type="datetime-local" name="end_at">
  </div>
</div>

<div class="form-check" style="margin-top:.5rem">
  <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
    <input type="checkbox" name="is_active" checked>
    <span>Aktiv (auf Dashboard anzeigen)</span>
  </label>
</div>
