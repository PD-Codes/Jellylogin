{% extends "base.html" %}
{% block title %}Fehler {{ code }}{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block body %}
<div class="auth-bg"></div>
<div class="auth-container">
  <div class="auth-card" style="text-align:center">
    <div class="auth-logo" style="color:var(--color-error)">
      <i class="fas fa-triangle-exclamation"></i>
    </div>
    <h1 class="auth-title">{{ code }}</h1>
    <p class="auth-subtitle">{{ message }}</p>
    <a href="/" class="btn btn--primary" style="display:inline-flex;margin-top:1.5rem">
      <i class="fas fa-house"></i>
      Zurück zum Dashboard
    </a>
  </div>
</div>
{% endblock %}
